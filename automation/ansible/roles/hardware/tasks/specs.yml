---
# ============================================================================
# Role: hardware - Task: specs
# Obtiene especificaciones completas del sistema
# ============================================================================

- name: Obtener información del sistema
  ansible.windows.win_shell: |
    # Recolectar información del sistema (usando Get-CimInstance de forma consistente)
    $systemInfo = Get-CimInstance -ClassName Win32_ComputerSystem -ErrorAction Stop
    $biosInfo = Get-CimInstance -ClassName Win32_BIOS -ErrorAction SilentlyContinue
    $processors = Get-CimInstance -ClassName Win32_Processor -ErrorAction SilentlyContinue
    $osInfo = Get-CimInstance -ClassName Win32_OperatingSystem -ErrorAction SilentlyContinue
    
    # Obtener número de serie (validación mejorada)
    $serialNumber = "No disponible"
    if ($biosInfo -and $biosInfo.SerialNumber) {
        $serialNumber = $biosInfo.SerialNumber
    }
    
    # Procesador: manejar múltiples procesadores
    $processorName = "N/A"
    if ($processors) {
        # Si hay múltiples, tomar el primero y agregar contador
        $processorName = $processors[0].Name
        if ($processors.Count -gt 1) {
            $processorName = "$processorName ($($processors.Count) procesadores)"
        }
    }
    
    # Obtener parche de actualización
    $path = "Registry::HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\Packages"
    $pkgs = Get-ChildItem $path -ErrorAction SilentlyContinue | 
            Where-Object { $_.Name -match "Package_for_RollupFix" } | 
            Sort-Object Name -Descending | 
            Select-Object -First 1
    
    # Disco
    $diskInfo = Get-CimInstance -ClassName Win32_DiskDrive -ErrorAction SilentlyContinue | 
                Select-Object Model, @{Name="SizeGB";Expression={[math]::round($_.Size / 1GB, 2)}}
    $logicalDisks = Get-CimInstance -ClassName Win32_LogicalDisk -ErrorAction SilentlyContinue | 
                    Where-Object { $_.DriveType -eq 3 }
    
    # Red
    $networkAdapters = Get-CimInstance -ClassName Win32_NetworkAdapterConfiguration -ErrorAction SilentlyContinue | 
                       Where-Object { $_.IPEnabled -eq $true }
    $wifiAdapter = $networkAdapters | Where-Object { $_.Description -match "Wi-Fi|Wireless" }
    $wifiIP = if ($wifiAdapter -and $wifiAdapter.IPAddress) { $wifiAdapter.IPAddress -join ', ' } else { "No conectado" }
    $ethernetAdapter = $networkAdapters | Where-Object { $_.Description -notmatch "Wi-Fi|Wireless" }
    $ethernetIP = if ($ethernetAdapter -and $ethernetAdapter.IPAddress) { $ethernetAdapter.IPAddress -join ', ' } else { "No conectado" }
    
    # Version Windows (con fallback si DisplayVersion no existe)
    $displayVersion = "N/A"
    try {
        $displayVersion = Get-ItemPropertyValue -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' -Name DisplayVersion -ErrorAction Stop
    } catch {
        # Intentar obtener desde otra propiedad
        try {
            $displayVersion = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' -ErrorAction Stop).ReleaseId
        } catch {
            $displayVersion = "N/A"
        }
    }
    
    $buildNumber = if ($osInfo -and $osInfo.BuildNumber) { $osInfo.BuildNumber } else { "N/A" }
    $versionWinver = if ($pkgs -and $pkgs.PSChildName) { $pkgs.PSChildName -replace ".*~", "" } else { "N/A" }
    
    # Fecha instalación (validación mejorada)
    $formattedInstallDate = "N/A"
    if ($osInfo -and $osInfo.InstallDate) {
        try {
            $installDate = [DateTime]::ParseExact($osInfo.InstallDate.Split('.')[0], "yyyyMMddHHmmss", $null)
            $formattedInstallDate = $installDate.ToString("dd/MM/yyyy HH:mm:ss")
        } catch {
            $formattedInstallDate = "N/A"
        }
    }
    
    # Espacio en disco
    $diskC = $logicalDisks | Where-Object { $_.DeviceID -eq "C:" }
    $freeSpaceGB = if ($diskC) { [math]::round($diskC.FreeSpace / 1GB, 2) } else { "N/A" }
    $totalSpaceGB = if ($diskC) { [math]::round($diskC.Size / 1GB, 2) } else { "N/A" }
    
    # Validaciones de objetos antes de mostrar
    $equipoName = if ($systemInfo -and $systemInfo.Name) { $systemInfo.Name } else { "N/A" }
    $modelo = if ($systemInfo -and $systemInfo.Model) { $systemInfo.Model } else { "N/A" }
    $fabricante = if ($systemInfo -and $systemInfo.Manufacturer) { $systemInfo.Manufacturer } else { "N/A" }
    $ramGB = if ($systemInfo -and $systemInfo.TotalPhysicalMemory) { [math]::round($systemInfo.TotalPhysicalMemory / 1GB, 2) } else { "N/A" }
    $biosVersion = if ($biosInfo -and $biosInfo.SMBIOSBIOSVersion) { $biosInfo.SMBIOSBIOSVersion } else { "N/A" }
    $osCaption = if ($osInfo -and $osInfo.Caption) { $osInfo.Caption } else { "N/A" }
    
    # Output formateado
    Write-Output "========================================================="
    Write-Output "             ESPECIFICACIONES DEL SISTEMA"
    Write-Output "========================================================="
    Write-Output "Nombre del equipo: $equipoName"
    Write-Output "Modelo del equipo: $modelo"
    Write-Output "Fabricante: $fabricante"
    Write-Output "Numero de Serie: $serialNumber"
    Write-Output "Procesador: $processorName"
    Write-Output "RAM (GB): $ramGB"
    Write-Output "Version BIOS: $biosVersion"
    Write-Output "Sistema Operativo: $osCaption"
    Write-Output "Version Windows: $displayVersion (Build $buildNumber)"
    Write-Output "Parche: $versionWinver"
    Write-Output "Fecha Instalacion: $formattedInstallDate"
    Write-Output "IP Wi-Fi: $wifiIP"
    Write-Output "IP Ethernet: $ethernetIP"
    Write-Output "========================================================="
    Write-Output "                 INFORMACION DEL DISCO"
    Write-Output "========================================================="
    Write-Output "Disco C Total: $totalSpaceGB GB"
    Write-Output "Disco C Libre: $freeSpaceGB GB"
    
    if ($diskInfo) {
        $diskInfo | ForEach-Object {
            $diskModel = if ($_.Model) { $_.Model } else { "N/A" }
            $diskSize = if ($_.SizeGB) { $_.SizeGB } else { "N/A" }
            Write-Output "Modelo Disco: $diskModel"
            Write-Output "Tamano Disco: $diskSize GB"
        }
    }
  register: system_specs
  changed_when: false
  failed_when: false

- name: Validar que se obtuvo información
  fail:
    msg: "No se pudo obtener información del sistema. Verificar conectividad y permisos."
  when: system_specs.rc != 0 or system_specs.stdout_lines is not defined or system_specs.stdout_lines | length == 0

- name: Mostrar especificaciones
  debug:
    msg: "{{ system_specs.stdout_lines }}"
