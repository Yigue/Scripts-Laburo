---
# ============================================================================
# Role: network - Task: speedtest
# Test de velocidad de conexión a Internet
# ============================================================================
# Métodos disponibles:
# 1. PowerShell puro (siempre disponible)
# 2. speedtest-cli (si está instalado)
# ============================================================================

- name: Test de velocidad usando PowerShell puro
  ansible.windows.win_shell: |
    # Test de descarga usando múltiples servidores
    function Test-DownloadSpeed {
      param([string]$Url, [int]$SizeMB = 10)
      
      try {
        $webClient = New-Object System.Net.WebClient
        $start = Get-Date
        
        # Descargar archivo de prueba (usamos un archivo conocido)
        $tempFile = "$env:TEMP\speedtest_$(Get-Random).tmp"
        $webClient.DownloadFile($Url, $tempFile)
        
        $end = Get-Date
        $duration = ($end - $start).TotalSeconds
        
        $fileSize = (Get-Item $tempFile).Length / 1MB
        Remove-Item $tempFile -Force -ErrorAction SilentlyContinue
        
        $speedMbps = ($fileSize * 8) / $duration
        
        return @{
          success = $true
          speed_mbps = [math]::Round($speedMbps, 2)
          size_mb = [math]::Round($fileSize, 2)
          duration_s = [math]::Round($duration, 2)
        }
      } catch {
        return @{ success = $false; error = $_.Exception.Message }
      }
    }
    
    # Test de latencia
    function Test-Latency {
      param([string[]]$Hosts)
      
      $results = @()
      
      foreach ($h in $Hosts) {
        try {
          $pings = Test-Connection -ComputerName $h -Count 4 -ErrorAction Stop
          $avg = ($pings | Measure-Object -Property ResponseTime -Average).Average
          $min = ($pings | Measure-Object -Property ResponseTime -Minimum).Minimum
          $max = ($pings | Measure-Object -Property ResponseTime -Maximum).Maximum
          
          $results += @{
            host = $h
            success = $true
            avg_ms = [math]::Round($avg, 1)
            min_ms = $min
            max_ms = $max
          }
        } catch {
          $results += @{ host = $h; success = $false; error = $_.Exception.Message }
        }
      }
      
      return $results
    }
    
    # Test de subida
    function Test-UploadSpeed {
      param([string]$Url, [int]$SizeMB = 5)
      
      try {
        $testData = New-Object byte[] (1024 * 1024 * $SizeMB)
        (new-object Random).NextBytes($testData)
        
        $webClient = New-Object System.Net.WebClient
        $webClient.UploadTimeout = 30000  # 30 segundos
        
        $start = Get-Date
        $response = $webClient.UploadData($Url, "POST", $testData)
        $end = Get-Date
        
        $duration = ($end - $start).TotalSeconds
        $speedMbps = (($SizeMB * 8) / $duration)
        
        return @{
          success = $true
          speed_mbps = [math]::Round($speedMbps, 2)
          duration_s = [math]::Round($duration, 2)
        }
      } catch {
        return @{ success = $false; error = $_.Exception.Message }
      }
    }
    
    # Ejecutar tests
    $latencyHosts = @('8.8.8.8', '1.1.1.1', 'microsoft.com', 'google.com')
    $latencyResults = Test-Latency -Hosts $latencyHosts
    
    # Test de descarga (usamos archivo de prueba)
    $downloadTests = @(
      @{ name = "Cloudflare CDN"; url = "https://speed.cloudflare.com/__down?bytes=10000000" }
    )
    
    $downloadResults = @()
    foreach ($test in $downloadTests) {
      Write-Host "Probando descarga: $($test.name)..." -NoNewline
      $result = Test-DownloadSpeed -Url $test.url
      $result.source = $test.name
      $downloadResults += $result
      if ($result.success) {
        Write-Host " $($result.speed_mbps) Mbps"
      } else {
        Write-Host " Error"
      }
    }
    
    # Test de subida
    $uploadTests = @(
      @{ name = "HttpBin"; url = "https://httpbin.org/post" }
    )
    
    $uploadResults = @()
    foreach ($test in $uploadTests) {
      Write-Host "Probando subida: $($test.name)..." -NoNewline
      $result = Test-UploadSpeed -Url $test.url -SizeMB 5
      $result.source = $test.name
      $uploadResults += $result
      if ($result.success) {
        Write-Host " $($result.speed_mbps) Mbps"
      } else {
        Write-Host " Error"
      }
    }
    
    # Calcular promedio de latencia
    $avgLatency = ($latencyResults | Where-Object { $_.success } | Measure-Object -Property avg_ms -Average).Average
    
    # Calcular jitter correctamente (diferencia media entre latencias consecutivas)
    $jitter = 0
    $latenciesArray = ($latencyResults | Where-Object { $_.success } | ForEach-Object { $_.avg_ms })
    if ($latenciesArray.Count -gt 1) {
      $diffs = @()
      for ($i = 1; $i -lt $latenciesArray.Count; $i++) {
        $diffs += [Math]::Abs($latenciesArray[$i] - $latenciesArray[$i-1])
      }
      if ($diffs.Count -gt 0) {
        $jitter = ($diffs | Measure-Object -Average).Average
      }
    }
    
    # Mejor velocidad de descarga y subida
    $bestDownload = ($downloadResults | Where-Object { $_.success } | Sort-Object -Property speed_mbps -Descending | Select-Object -First 1)
    $bestUpload = ($uploadResults | Where-Object { $_.success } | Sort-Object -Property speed_mbps -Descending | Select-Object -First 1)
    
    @{
      timestamp = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
      latency = @{
        average_ms = if ($avgLatency) { [math]::Round($avgLatency, 1) } else { 0 }
        details = $latencyResults
      }
      download = @{
        speed_mbps = if ($bestDownload) { $bestDownload.speed_mbps } else { 0 }
        source = if ($bestDownload) { $bestDownload.source } else { "N/A" }
        all_tests = $downloadResults
      }
      upload = @{
        speed_mbps = if ($bestUpload) { $bestUpload.speed_mbps } else { 0 }
        source = if ($bestUpload) { $bestUpload.source } else { "N/A" }
        all_tests = $uploadResults
      }
      jitter_ms = [math]::Round($jitter, 1)
    } | ConvertTo-Json -Depth 4
  register: speedtest_raw
  changed_when: false
  failed_when: false

- name: Parsear resultados de speedtest
  set_fact:
    speedtest: "{{ speedtest_raw.stdout | from_json }}"
  when: speedtest_raw.stdout is defined

- name: Mostrar resultados de velocidad
  debug:
    msg:
      - "=========================================="
      - "     🚀 TEST DE VELOCIDAD DE INTERNET"
      - "=========================================="
      - "Fecha: {{ speedtest.timestamp | default('N/A') }}"
      - ""
      - "📥 DESCARGA:"
      - "   Velocidad: {{ speedtest.download.speed_mbps | default('N/A') }} Mbps"
      - "   Fuente: {{ speedtest.download.source | default('N/A') }}"
      - ""
      - "📤 SUBIDA:"
      - "   Velocidad: {{ speedtest.upload.speed_mbps | default('N/A') }} Mbps"
      - "   Fuente: {{ speedtest.upload.source | default('N/A') }}"
      - ""
      - "📊 LATENCIA:"
      - "   Promedio: {{ speedtest.latency.average_ms | default('N/A') }} ms"
      - "   Jitter: {{ speedtest.jitter_ms | default('N/A') }} ms"
      - ""
      - "=========================================="
  when: speedtest is defined

- name: Detalles de latencia por servidor
  debug:
    msg: "{{ '✅' if item.success else '❌' }} {{ item.host }}: {{ item.avg_ms ~ 'ms (min:' ~ item.min_ms ~ ', max:' ~ item.max_ms ~ ')' if item.success else 'Error' }}"
  loop: "{{ speedtest.latency.details | default([]) }}"
  when: speedtest is defined

- name: Evaluación de conexión
  debug:
    msg:
      - "=========================================="
      - "     📋 EVALUACIÓN"
      - "=========================================="
      - "{{ '✅ Velocidad descarga excelente' if (speedtest.download.speed_mbps | default(0) | float) > 50 else ('✅ Velocidad descarga buena' if (speedtest.download.speed_mbps | default(0) | float) > 20 else ('⚠️ Velocidad descarga aceptable' if (speedtest.download.speed_mbps | default(0) | float) > 5 else '❌ Velocidad descarga baja')) }}"
      - "{{ '✅ Velocidad subida excelente' if (speedtest.upload.speed_mbps | default(0) | float) > 25 else ('✅ Velocidad subida buena' if (speedtest.upload.speed_mbps | default(0) | float) > 10 else ('⚠️ Velocidad subida aceptable' if (speedtest.upload.speed_mbps | default(0) | float) > 3 else '❌ Velocidad subida baja')) }}"
      - "{{ '✅ Latencia excelente' if (speedtest.latency.average_ms | default(999) | float) < 30 else ('✅ Latencia buena' if (speedtest.latency.average_ms | default(999) | float) < 60 else ('⚠️ Latencia alta' if (speedtest.latency.average_ms | default(999) | float) < 100 else '❌ Latencia muy alta')) }}"
  when: speedtest is defined

- name: Set speedtest_facts
  set_fact:
    speedtest_results:
      download_mbps: "{{ speedtest.download.speed_mbps | default(0) }}"
      upload_mbps: "{{ speedtest.upload.speed_mbps | default(0) }}"
      latency_ms: "{{ speedtest.latency.average_ms | default(0) }}"
      jitter_ms: "{{ speedtest.jitter_ms | default(0) }}"
