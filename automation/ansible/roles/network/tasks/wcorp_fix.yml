---
# ============================================================================
# Role: network - Task: wcorp_fix
# Ejecuta script de WCORP + cleanDNS + gpupdate
# ============================================================================

- name: Verificar conectividad inicial
  ansible.windows.win_shell: |
    $ping = Test-Connection -ComputerName 8.8.8.8 -Count 1 -Quiet -ErrorAction SilentlyContinue
    if ($ping) {
      Write-Output "OK"
    } else {
      Write-Output "FALLO"
    }
  register: connectivity_before
  changed_when: false
  failed_when: false

- name: Advertencia sobre comandos que requieren reinicio
  debug:
    msg:
      - "⚠️ ADVERTENCIA: Los comandos de reseteo (Winsock/IP) pueden requerir reinicio del equipo"
      - "El comando gpupdate se ejecutará de forma asíncrona."
      - "Conectividad inicial: {{ connectivity_before.stdout | default('N/A') }}"

- name: Limpiar caché DNS
  ansible.windows.win_shell: |
    ipconfig /flushdns
    Write-Output "Cache DNS limpiado"
  register: dns_flush
  changed_when: false

- name: Limpiar caché NetBIOS
  ansible.windows.win_shell: |
    nbtstat -R
    nbtstat -RR
    Write-Output "Cache NetBIOS limpiado"
  register: netbios_flush
  ignore_errors: true

- name: Resetear Winsock
  ansible.windows.win_shell: |
    netsh winsock reset
    Write-Output "Winsock reseteado"
  register: winsock_reset
  ignore_errors: true

- name: Resetear stack IP
  ansible.windows.win_shell: |
    netsh int ip reset
    Write-Output "Stack IP reseteado"
  register: ip_reset
  ignore_errors: true

- name: Actualizar políticas de grupo (gpupdate)
  ansible.windows.win_shell: |
    gpupdate /force
    Write-Output "Politicas de grupo actualizadas"
  register: gpupdate
  async: 120
  poll: 10
  failed_when: false

- name: Verificar resultado de gpupdate
  debug:
    msg: "⚠️ GPUpdate puede haber fallado o estar ejecutándose en segundo plano. Revisar logs del equipo si hay problemas."
  when: gpupdate.failed | default(false)

- name: Verificar conectividad post-fix
  ansible.windows.win_shell: |
    $tests = @(
      @{ Target = "8.8.8.8"; Name = "Google DNS" },
      @{ Target = "1.1.1.1"; Name = "Cloudflare DNS" }
    )
    
    $results = @()
    foreach ($test in $tests) {
      $ping = Test-Connection -ComputerName $test.Target -Count 1 -Quiet -ErrorAction SilentlyContinue
      $results += "$($test.Name): $(if ($ping) { 'OK' } else { 'FALLO' })"
    }
    
    Write-Output "Conectividad inicial: {{ connectivity_before.stdout | default('N/A') }}"
    $results | ForEach-Object { Write-Output $_ }
  register: connectivity_test
  changed_when: false

- name: Verificar errores en comandos críticos
  debug:
    msg:
      - "⚠️ ADVERTENCIA: Algunos comandos pueden haber fallado:"
      - "{{ '  • Reset Winsock falló' if (winsock_reset.failed | default(false)) else '' }}"
      - "{{ '  • Reset IP falló' if (ip_reset.failed | default(false)) else '' }}"
      - "{{ '  • GPUpdate falló' if (gpupdate.failed | default(false)) else '' }}"
  when: 
    - (winsock_reset.failed | default(false)) or 
      (ip_reset.failed | default(false)) or 
      (gpupdate.failed | default(false))

- name: Resumen de WCORP Fix
  debug:
    msg:
      - "=========================================="
      - "        WCORP FIX - RESULTADO"
      - "=========================================="
      - "Conectividad inicial: {{ connectivity_before.stdout | default('N/A') }}"
      - "DNS Flush: {{ dns_flush.stdout | default('OK') }}"
      - "NetBIOS: {{ netbios_flush.stdout | default('OK') }}"
      - "Winsock: {{ winsock_reset.stdout | default('OK') }}"
      - "IP Reset: {{ ip_reset.stdout | default('OK') }}"
      - "GPUpdate: {{ gpupdate.stdout | default('OK') }}"
      - "----------------------------------------"
      - "Pruebas de conectividad post-fix:"
      - "{{ connectivity_test.stdout_lines | default(['Sin datos']) }}"
      - "----------------------------------------"
      - "⚠️ NOTA: Los comandos de reset (Winsock/IP) pueden requerir reinicio del equipo para aplicar cambios completamente."