---
# ============================================================================
# Role: printers - Task: zebra_calibrate
# Calibración de impresoras Zebra vía TCP/IP
# ============================================================================

- name: Verificar IP de Zebra proporcionada
  fail:
    msg: "Debe proporcionar la IP de la impresora Zebra con --extra-vars 'zebra_ip=X.X.X.X'"
  when: zebra_ip is not defined or zebra_ip == ""

- name: Verificar conectividad con la impresora Zebra
  ansible.windows.win_shell: |
    $ip = "{{ zebra_ip }}"
    $port = {{ zebra_default_port | default(zebra_port) | default(9100) }}
    
    $tcpClient = $null
    try {
      $tcpClient = New-Object System.Net.Sockets.TcpClient
      $tcpClient.ReceiveTimeout = 5000
      $tcpClient.SendTimeout = 5000
      
      # Conectar con timeout
      $connectResult = $tcpClient.BeginConnect($ip, $port, $null, $null)
      $wait = $connectResult.AsyncWaitHandle.WaitOne(5000, $false)
      
      if (-not $wait) {
        Write-Output "FAIL: Timeout conectando a $ip`:$port"
        exit 1
      }
      
      $tcpClient.EndConnect($connectResult)
      
      if ($tcpClient.Connected) {
        Write-Output "OK: Conectado a $ip`:$port"
      } else {
        Write-Output "FAIL: No se pudo conectar a $ip`:$port"
        exit 1
      }
    } catch {
      Write-Output "FAIL: $($_.Exception.Message)"
      exit 1
    } finally {
      if ($tcpClient) {
        try { $tcpClient.Close() } catch { }
        try { $tcpClient.Dispose() } catch { }
      }
    }
  register: zebra_connectivity
  changed_when: false

- name: Error si no hay conectividad
  fail:
    msg: "No se puede conectar a la impresora Zebra en {{ zebra_ip }}:{{ zebra_default_port | default(zebra_port) | default(9100) }}. Verifica IP, puerto y que la impresora esté encendida y accesible en la red."
  when: zebra_connectivity.rc != 0 or "'FAIL' in zebra_connectivity.stdout"

- name: Enviar comando de calibración ZPL
  ansible.windows.win_shell: |
    $ip = "{{ zebra_ip }}"
    $port = {{ zebra_default_port | default(zebra_port) | default(9100) }}
    
    # Comando de calibración (Media Calibration)
    $calibCommand = "{{ zebra_calibration_command | default('~JC') }}"
    
    $tcpClient = $null
    $stream = $null
    $writer = $null
    
    try {
      $tcpClient = New-Object System.Net.Sockets.TcpClient
      $tcpClient.ReceiveTimeout = 5000
      $tcpClient.SendTimeout = 5000
      
      # Conectar con timeout
      $connectResult = $tcpClient.BeginConnect($ip, $port, $null, $null)
      $wait = $connectResult.AsyncWaitHandle.WaitOne(5000, $false)
      
      if (-not $wait) {
        $tcpClient.Close()
        throw "Timeout conectando a $ip`:$port"
      }
      
      $tcpClient.EndConnect($connectResult)
      
      if (-not $tcpClient.Connected) {
        throw "No se pudo conectar a $ip`:$port"
      }
      
      $stream = $tcpClient.GetStream()
      $writer = New-Object System.IO.StreamWriter($stream)
      $writer.AutoFlush = $true
      
      # Enviar comando
      $bytes = [System.Text.Encoding]::ASCII.GetBytes($calibCommand)
      $stream.Write($bytes, 0, $bytes.Length)
      $stream.Flush()
      
      Start-Sleep -Seconds 2
      
      Write-Output "OK: Comando de calibracion enviado"
      Write-Output "Comando: $calibCommand"
      Write-Output "IP: $ip"
      Write-Output "Puerto: $port"
      Write-Output ""
      Write-Output "La impresora deberia comenzar a calibrar los medios."
      Write-Output "Espere a que termine antes de imprimir."
    } catch {
      $errorMsg = "ERROR: $($_.Exception.Message)"
      Write-Output $errorMsg
      Write-Error $errorMsg
      exit 1
    } finally {
      if ($writer) { 
        try { $writer.Close() } catch { }
        try { $writer.Dispose() } catch { }
      }
      if ($stream) { 
        try { $stream.Close() } catch { }
        try { $stream.Dispose() } catch { }
      }
      if ($tcpClient) { 
        try { $tcpClient.Close() } catch { }
        try { $tcpClient.Dispose() } catch { }
      }
    }
  register: calibration_result
  failed_when: "'ERROR:' in calibration_result.stdout"

- name: Opción: Ejecutar Gap/Notch Sensing
  ansible.windows.win_shell: |
    $ip = "{{ zebra_ip }}"
    $port = {{ zebra_default_port | default(zebra_port) | default(9100) }}
    
    # Comando de Gap/Notch sensing
    $gapCommand = "{{ zebra_gap_calibration_command | default('~JG') }}"
    
    $tcpClient = $null
    $stream = $null
    $writer = $null
    
    try {
      $tcpClient = New-Object System.Net.Sockets.TcpClient
      $tcpClient.ReceiveTimeout = 5000
      $tcpClient.SendTimeout = 5000
      
      # Conectar con timeout
      $connectResult = $tcpClient.BeginConnect($ip, $port, $null, $null)
      $wait = $connectResult.AsyncWaitHandle.WaitOne(5000, $false)
      
      if (-not $wait) {
        $tcpClient.Close()
        throw "Timeout conectando a $ip`:$port"
      }
      
      $tcpClient.EndConnect($connectResult)
      
      if (-not $tcpClient.Connected) {
        throw "No se pudo conectar a $ip`:$port"
      }
      
      $stream = $tcpClient.GetStream()
      $writer = New-Object System.IO.StreamWriter($stream)
      $writer.AutoFlush = $true
      
      # Enviar comando
      $bytes = [System.Text.Encoding]::ASCII.GetBytes($gapCommand)
      $stream.Write($bytes, 0, $bytes.Length)
      $stream.Flush()
      
      Start-Sleep -Seconds 2
      
      Write-Output "OK: Gap Sensing ejecutado"
      Write-Output "Comando: $gapCommand"
    } catch {
      $errorMsg = "ERROR: $($_.Exception.Message)"
      Write-Output $errorMsg
      Write-Error $errorMsg
      exit 1
    } finally {
      if ($writer) { 
        try { $writer.Close() } catch { }
        try { $writer.Dispose() } catch { }
      }
      if ($stream) { 
        try { $stream.Close() } catch { }
        try { $stream.Dispose() } catch { }
      }
      if ($tcpClient) { 
        try { $tcpClient.Close() } catch { }
        try { $tcpClient.Dispose() } catch { }
      }
    }
  register: gap_result
  when: run_gap_sensing | default(false) | bool
  failed_when: "'ERROR:' in gap_result.stdout"

- name: Resumen de calibración Zebra
  debug:
    msg:
      - "=========================================="
      - "    CALIBRACIÓN ZEBRA - RESULTADO"
      - "=========================================="
      - "{{ calibration_result.stdout_lines }}"
      - "{{ gap_result.stdout_lines | default([]) }}"
