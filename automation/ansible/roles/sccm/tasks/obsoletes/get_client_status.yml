---
# ============================================================================
# Role: sccm - Task: get_client_status
# Consultar estado del cliente SCCM en el equipo
# ============================================================================

- name: Obtener estado del cliente SCCM
  ansible.windows.win_shell: |
    try {
        $ccm = Get-CimInstance -Namespace "root\ccm" -Class "CCM_Client" -ErrorAction Stop
        $state = Get-Service -Name "CcmExec"
        
        [PSCustomObject]@{
            Installed = $true
            Version = $ccm.ClientVersion
            ServiceStatus = $state.Status.ToString()
            SiteCode = $ccm.SiteCode
        } | ConvertTo-Json
    } catch {
        @{ Installed = $false; error = $_.Exception.Message } | ConvertTo-Json
    }
  register: sccm_client_status_raw
  changed_when: false
  failed_when: false

- name: Parsear estado cliente SCCM
  set_fact:
    sccm_client_status: "{{ sccm_client_status_raw.stdout | from_json }}"
  when: sccm_client_status_raw.stdout is defined

- name: Mostrar estado cliente SCCM
  debug:
    msg:
      - "=========================================="
      - "     ESTADO DEL CLIENTE SCCM"
      - "=========================================="
      - "{{ 'Cliente SCCM instalado' if (sccm_client_status.Installed | default(false)) else 'Cliente SCCM NO instalado' }}"
      - "{{ 'Versión: ' + sccm_client_status.Version if sccm_client_status.Version is defined else '' }}"
      - "{{ 'Estado del servicio: ' + sccm_client_status.ServiceStatus if sccm_client_status.ServiceStatus is defined else '' }}"
      - "{{ 'Código de sitio: ' + sccm_client_status.SiteCode if sccm_client_status.SiteCode is defined else '' }}"
      - "{{ 'Error: ' + sccm_client_status.error if sccm_client_status.error is defined else '' }}"
