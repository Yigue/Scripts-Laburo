---
# ============================================================================
# Role: sccm - Task: audit_missing_clients
# Auditoría de equipos sin cliente SCCM o que no reportan
# ============================================================================
# Variables:
#   sccm_server: Servidor SCCM (requerido)
#   sccm_site_code: Código del sitio SCCM (requerido)
#   domain_controller: Controlador de dominio (requerido)
# ============================================================================

- name: Validar variables requeridas
  fail:
    msg: |
      Las siguientes variables deben estar definidas:
      
      - sccm_server: Servidor SCCM (ej: sccm01.empresa.local)
      - sccm_site_code: Código del sitio (ej: ABC)
      - domain_controller: Controlador de dominio (ej: dc01.empresa.local)
      
      Configurar en: inventory/group_vars/all.yml o pasar como:
      --extra-vars "sccm_server=sccm01.empresa.local sccm_site_code=ABC domain_controller=dc01.empresa.local"
  when: 
    - sccm_server is not defined or sccm_server == ""
    - or sccm_site_code is not defined or sccm_site_code == ""
    - or domain_controller is not defined or domain_controller == ""

- name: Verificar conectividad con Domain Controller
  ansible.windows.win_ping:
  delegate_to: "{{ domain_controller }}"
  register: dc_ping
  ignore_errors: yes

- name: Fallar si DC no es accesible
  fail:
    msg: "No se puede conectar al Domain Controller '{{ domain_controller }}'. Verifique conectividad y credenciales."
  when: dc_ping.ping is not defined or dc_ping.ping != "pong"

- name: Auditar equipos sin cliente SCCM
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $namespace = "root\sms\site_{{ sccm_site_code }}"
    
    $ad_computers = Get-ADComputer -Filter 'Enabled -eq $true' | Select-Object -ExpandProperty Name
    $sccm_devices = Get-CimInstance -ComputerName "{{ sccm_server }}" -Namespace $namespace -Query "SELECT Name FROM SMS_R_System WHERE Client = 1" | Select-Object -ExpandProperty Name
    
    $missing = $ad_computers | Where-Object { $_ -notin $sccm_devices }
    
    @{
        total_ad = $ad_computers.Count
        total_sccm = $sccm_devices.Count
        missing_count = $missing.Count
        missing_list = $missing
    } | ConvertTo-Json
  register: sccm_audit_raw
  changed_when: false
  failed_when: false
  delegate_to: "{{ domain_controller }}"
  vars:
    ansible_user: "{{ vault_ansible_user }}"
    ansible_password: "{{ vault_ansible_password }}"
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore

- name: Parsear auditoría SCCM
  set_fact:
    sccm_audit: "{{ sccm_audit_raw.stdout | from_json }}"
  when: sccm_audit_raw.stdout is defined

- name: Mostrar error si falló la auditoría
  fail:
    msg: "Error ejecutando auditoría: {{ sccm_audit.error | default('Error desconocido') }}"
  when: 
    - sccm_audit is defined
    - sccm_audit.error is defined

- name: Mostrar resumen de auditoría SCCM
  debug:
    msg:
      - "=========================================="
      - "     AUDITORÍA SCCM vs AD"
      - "=========================================="
      - "Equipos en AD: {{ sccm_audit.total_ad | default(0) }}"
      - "Equipos con cliente SCCM: {{ sccm_audit.total_sccm | default(0) }}"
      - "Equipos sin SCCM: {{ sccm_audit.missing_count | default(0) }}"
      - "------------------------------------------"
      - "LISTA DE EQUIPOS FALTANTES:"
      - "{{ sccm_audit.missing_list | default([]) | list }}"
