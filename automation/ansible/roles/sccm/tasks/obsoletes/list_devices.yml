---
# ============================================================================
# Role: sccm - Task: list_devices (OPTIMIZADO)
# Listar dispositivos SCCM con queries eficientes
# ============================================================================
# Variables:
#   sccm_server: Servidor SCCM (requerido)
#   sccm_site_code: Código del sitio SCCM (requerido)
# ============================================================================

- name: Validar variables de SCCM
  fail:
    msg: |
      Las variables de SCCM deben estar definidas:
      
      - sccm_server: Servidor SCCM (ej: sccm01.empresa.local)
      - sccm_site_code: Código del sitio (ej: ABC)
      
      Configurar en: inventory/group_vars/all.yml o pasar como:
      --extra-vars "sccm_server=sccm01.empresa.local sccm_site_code=ABC"
  when: 
    - sccm_server is not defined or sccm_server == ""
    - or sccm_site_code is not defined or sccm_site_code == ""

- name: Consultar dispositivos en SCCM (Query optimizada)
  ansible.windows.win_shell: |
    $namespace = "root\sms\site_{{ sccm_site_code }}"
    # Query directa para evitar procesar miles de objetos en memoria local
    Get-CimInstance -ComputerName "{{ sccm_server }}" -Namespace $namespace -Query "SELECT Name, Client, ClientVersion, LastLogonTimestamp FROM SMS_R_System WHERE Client = 1" | Select-Object Name, ClientVersion, LastLogonTimestamp | ConvertTo-Json
  register: sccm_devices_raw
  changed_when: false
  failed_when: false
  delegate_to: "{{ domain_controller }}"
  vars:
    ansible_user: "{{ vault_ansible_user }}"
    ansible_password: "{{ vault_ansible_password }}"
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore

- name: Parsear dispositivos SCCM
  set_fact:
    sccm_devices: "{{ sccm_devices_raw.stdout | from_json }}"
  when: sccm_devices_raw.stdout is defined

- name: Mostrar error si falló la consulta
  fail:
    msg: "Error consultando dispositivos SCCM: {{ sccm_devices.error | default('Error desconocido') }}"
  when: 
    - sccm_devices is defined
    - sccm_devices.error is defined

- name: Mostrar dispositivos SCCM
  debug:
    msg:
      - "=========================================="
      - "     DISPOSITIVOS SCCM"
      - "=========================================="
      - "Total: {{ sccm_devices | length | default(0) }} dispositivos"
      - "------------------------------------------"
      - "{{ sccm_devices | default([]) | list }}"
