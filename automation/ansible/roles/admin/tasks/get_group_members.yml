---
# ============================================================================
# Role: admin - Task: get_group_members
# Obtener membresías de grupos usando PowerShell nativo
# ============================================================================

- name: Verificar que se proporcionó el grupo
  fail:
    msg: "Debe proporcionar el nombre del grupo con --extra-vars 'group_name=GRUPO'"
  when: group_name is not defined or group_name == ""

- name: Validar que domain_controller esté definido
  fail:
    msg: |
      La variable 'domain_controller' debe estar definida.
      
      Configurar en: inventory/group_vars/all.yml o pasar como:
      --extra-vars "domain_controller=dc01.empresa.local"
  when: domain_controller is not defined or domain_controller == ""

- name: Verificar conectividad con Domain Controller
  ansible.windows.win_ping:
  delegate_to: "{{ domain_controller }}"
  register: dc_ping
  ignore_errors: yes

- name: Fallar si DC no es accesible
  fail:
    msg: "No se puede conectar al Domain Controller '{{ domain_controller }}'. Verifique conectividad y credenciales."
  when: dc_ping.ping is not defined or dc_ping.ping != "pong"

- name: Consultar miembros del grupo usando PowerShell
  ansible.windows.win_shell: |
    try {
      Import-Module ActiveDirectory -ErrorAction Stop
      
      $groupName = "{{ group_name }}"
      $group = Get-ADGroup -Identity $groupName -ErrorAction Stop
      
      $members = Get-ADGroupMember -Identity $groupName | ForEach-Object {
        $memberType = $_.objectClass
        $memberInfo = @{
          Name = $_.Name
          SamAccountName = $_.SamAccountName
          DistinguishedName = $_.DistinguishedName
          ObjectClass = $memberType
        }
        
        # Agregar información adicional según el tipo
        if ($memberType -eq "user") {
          $user = Get-ADUser -Identity $_.SamAccountName -Properties DisplayName, Enabled
          $memberInfo['DisplayName'] = $user.DisplayName
          $memberInfo['Enabled'] = $user.Enabled
        } elseif ($memberType -eq "computer") {
          $computer = Get-ADComputer -Identity $_.Name -Properties OperatingSystem
          $memberInfo['OperatingSystem'] = $computer.OperatingSystem
        }
        
        [PSCustomObject]$memberInfo
      }
      
      $result = @{
        success = $true
        groupName = $group.Name
        groupDN = $group.DistinguishedName
        memberCount = $members.Count
        members = $members
      }
      
      $result | ConvertTo-Json -Depth 10
    } catch [Microsoft.ActiveDirectory.Management.ADIdentityNotFoundException] {
      @{ success = $false; error = "Grupo '{{ group_name }}' no encontrado en AD" } | ConvertTo-Json
    } catch [System.Management.Automation.CommandNotFoundException] {
      @{ success = $false; error = "Módulo ActiveDirectory no encontrado. Instale RSAT-AD-PowerShell." } | ConvertTo-Json
    } catch {
      @{ success = $false; error = $_.Exception.Message } | ConvertTo-Json
    }
  register: ad_group_raw
  changed_when: false
  delegate_to: "{{ domain_controller }}"

- name: Parsear resultado del grupo
  set_fact:
    ad_group_result: "{{ ad_group_raw.stdout | from_json }}"

- name: Mostrar error si falló la consulta
  fail:
    msg: "Error consultando grupo: {{ ad_group_result.error }}"
  when: not (ad_group_result.success | default(false))

- name: Mostrar lista de miembros del grupo
  debug:
    msg:
      - "=========================================="
      - "     MIEMBROS DEL GRUPO: {{ ad_group_result.groupName }}"
      - "=========================================="
      - "Total: {{ ad_group_result.memberCount }} miembros"
      - "Distinguished Name: {{ ad_group_result.groupDN }}"
      - "------------------------------------------"
      - "{{ ad_group_result.members | list }}"
