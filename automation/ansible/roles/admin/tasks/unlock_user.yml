---
# ============================================================================
# Role: admin - Task: unlock_user
# Desbloquear usuario en Active Directory usando colección microsoft.ad
# ============================================================================
# Requiere: Variable 'ad_username' con el nombre del usuario a desbloquear
# Ejemplo: --extra-vars "ad_username=jperez"
# ============================================================================

- name: Verificar que se proporcionó el username
  fail:
    msg: "Debe proporcionar el nombre de usuario con --extra-vars 'ad_username=USUARIO'"
  when: ad_username is not defined or ad_username == ""

- name: Validar que domain_controller esté definido
  fail:
    msg: "Variable 'domain_controller' no está definida. Debe configurarse en inventory/group_vars/all/vault.yml o windows_hosts.yml"
  when: domain_controller is not defined or domain_controller == ""

- name: Verificar conectividad con Domain Controller
  ansible.windows.win_ping:
  delegate_to: "{{ domain_controller }}"
  register: dc_ping
  ignore_errors: yes

- name: Fallar si DC no es accesible
  fail:
    msg: "No se puede conectar al Domain Controller '{{ domain_controller }}'. Verifique conectividad y credenciales."
  when: dc_ping.ping is not defined or dc_ping.ping != "pong"

- name: Obtener información del usuario (microsoft.ad)
  microsoft.ad.object_info:
    filter: "(&(objectClass=user)(sAMAccountName={{ ad_username }}))"
    properties:
      - SamAccountName
      - Name
      - Enabled
      - LockedOut
      - PasswordExpired
      - LastLogonDate
      - PasswordLastSet
  register: user_query
  delegate_to: "{{ domain_controller }}"

- name: Verificar si el usuario existe
  fail:
    msg: "Usuario '{{ ad_username }}' no encontrado en AD (filtro: sAMAccountName={{ ad_username }})"
  when: user_query.objects | length == 0

- name: Parsear información del usuario
  set_fact:
    user_info: "{{ user_query.objects[0] }}"

- name: Mostrar estado actual del usuario
  debug:
    msg:
      - "=========================================="
      - "     INFORMACIÓN DEL USUARIO"
      - "=========================================="
      - "Usuario: {{ user_info.SamAccountName }}"
      - "Nombre: {{ user_info.Name }}"
      - "Habilitado: {{ user_info.Enabled }}"
      - "Bloqueado: {{ user_info.LockedOut }}"
      - "Password expirado: {{ user_info.PasswordExpired | default(false) }}"
      - "Último login: {{ user_info.LastLogonDate | default('Nunca') }}"
      - "Password cambiado: {{ user_info.PasswordLastSet | default('Nunca') }}"

- name: Desbloquear usuario si es necesario
  block:
    - name: Ejecutar desbloqueo (microsoft.ad)
      microsoft.ad.user:
        name: "{{ ad_username }}"
        state: present
        account_locked: false
      register: unlock_result
      delegate_to: "{{ domain_controller }}"
      when: user_info.LockedOut | default(false)

    - name: Registrar desbloqueo en logs de auditoría
      community.windows.win_eventlog_entry:
        log: Application
        source: "Ansible-ADUnlock"
        event_id: 1001
        entry_type: Information
        message: "[AUDIT] Usuario '{{ ad_username }}' desbloqueado por {{ ansible_user | default('Ansible') }}"
      delegate_to: "{{ domain_controller }}"
      when: unlock_result.changed
      ignore_errors: true
      register: audit_log

  rescue:
    - name: Fallar con mensaje claro
      fail:
        msg: "Error al intentar desbloquear al usuario: {{ ansible_failed_result.msg | default('Error desconocido') }}"

- name: Informar si el usuario no estaba bloqueado
  debug:
    msg:
      - "=========================================="
      - "     USUARIO NO BLOQUEADO"
      - "=========================================="
      - "El usuario '{{ ad_username }}' NO estaba bloqueado"
      - "Estado: {{ 'Habilitado' if user_info.Enabled else 'Deshabilitado' }}"
  when: not (user_info.LockedOut | default(false))

- name: Resumen de operación
  debug:
    msg:
      - "=========================================="
      - "     DESBLOQUEO DE USUARIO - RESULTADO"
      - "=========================================="
      - "Usuario: {{ ad_username }}"
      - "Domain Controller: {{ domain_controller }}"
      - "Acción: {{ 'Desbloqueado exitosamente' if (unlock_result.changed | default(false)) else 'No se requirió acción' }}"
      - "{{ 'ADVERTENCIA: Password expirado - El usuario debe cambiar su contraseña' if (user_info.PasswordExpired | default(false)) else '' }}"