---
# ============================================================================
# Role: admin - Task: list_ad_computers
# Listar equipos del dominio usando colección microsoft.ad
# ============================================================================

- name: Validar que domain_controller esté definido
  fail:
    msg: |
      La variable 'domain_controller' debe estar definida.
      
      Configurar en: inventory/group_vars/all.yml o pasar como:
      --extra-vars "domain_controller=dc01.empresa.local"
  when: domain_controller is not defined or domain_controller == ""

- name: Verificar conectividad con Domain Controller
  ansible.windows.win_ping:
  delegate_to: "{{ domain_controller }}"
  register: dc_ping
  ignore_errors: true

- name: Fallar si DC no es accesible
  fail:
    msg: "No se puede conectar al Domain Controller '{{ domain_controller }}'. Verifique conectividad y credenciales."
  when: dc_ping.ping is not defined or dc_ping.ping != "pong"

- name: Consultar equipos de AD (microsoft.ad)
  block:
    - name: Obtener información de computadoras
      microsoft.ad.object_info:
        filter: "{{ '(objectClass=computer)' if (ad_filter | default('*')) == '*' else ad_filter }}"
        search_base: "{{ ad_ou | default(omit) }}"
        properties:
          - Name
          - DNSHostName
          - OperatingSystem
          - OperatingSystemVersion
          - LastLogonDate
          - Enabled
          - IPv4Address
          - DistinguishedName
      register: ad_query
      delegate_to: "{{ domain_controller }}"
      vars:
        ansible_user: "{{ vault_ansible_user }}"
        ansible_password: "{{ vault_ansible_password }}"
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore

    - name: Parsear resultado de equipos AD
      set_fact:
        ad_computers_result:
          success: true
          count: "{{ ad_query.objects | length }}"
          computers: "{{ ad_query.objects }}"

  rescue:
    - name: Capturar error
      set_fact:
        ad_computers_result:
          success: false
          error: "Error consultando AD: {{ ansible_failed_result.msg | default('Error desconocido') }}"

- name: Mostrar error si falló la consulta
  fail:
    msg: "Error consultando AD: {{ ad_computers_result.error }}"
  when: not ad_computers_result.success

- name: Mostrar lista de equipos
  debug:
    msg:
      - "=========================================="
      - "     EQUIPOS ENCONTRADOS EN AD"
      - "=========================================="
      - "Total: {{ ad_computers_result.count }} equipos"
      - "------------------------------------------"
      - "{{ ad_computers_result.computers | list }}"
