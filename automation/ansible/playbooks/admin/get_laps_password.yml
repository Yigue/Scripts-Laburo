---
# ============================================================================
# Playbook: Obtener Password LAPS
# ============================================================================
# Obtiene la contraseña del Administrador Local (LAPS) desde AD
#
# Uso:
#   ansible-playbook -i inventory/hosts.ini playbooks/admin/get_laps_password.yml \
#     --extra-vars "target_host=NB001234"
#
# NOTA: Requiere permisos para leer ms-Mcs-AdmPwd en AD
#       Requiere que domain_controller esté configurado en group_vars
# ============================================================================

- name: Obtener Password LAPS
  hosts: localhost
  gather_facts: no
  
  tasks:
    - name: Validar que domain_controller esté definido
      fail:
        msg: |
          La variable 'domain_controller' debe estar definida.
          
          Configurar en: inventory/group_vars/windows_hosts.yml
          
          Ejemplo:
            domain_controller: "dc01.empresa.local"
          
          O pasar como variable:
            --extra-vars "domain_controller=dc01.empresa.local"
      when: domain_controller is not defined or domain_controller == ""
    
    - name: Verificar conectividad con Domain Controller
      ansible.windows.win_ping:
      delegate_to: "{{ domain_controller }}"
      ignore_errors: true
      register: dc_ping_result
    
    - name: Error si DC no es accesible
      fail:
        msg: |
          No se puede conectar al Domain Controller '{{ domain_controller }}'.
          
          Verificar:
            - El DC está encendido y accesible
            - WinRM está habilitado en el DC
            - Las credenciales son correctas
            - La IP/hostname del DC es correcta
      when: dc_ping_result.failed
    
    - name: Ejecutar obtención de LAPS
      include_role:
        name: admin
        tasks_from: get_laps_password.yml
